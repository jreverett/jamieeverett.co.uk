[build.environment]
  NODE_VERSION = "24"

# Self-hosted fonts are content-stable (versioned by the Geist release), so cache
# them aggressively — otherwise Netlify revalidates them on every visit.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Serve CV at any case variation
[[redirects]]
  from = "/cv"
  to = "/cv.pdf"
  status = 200

[[redirects]]
  from = "/CV"
  to = "/cv.pdf"
  status = 200

[[redirects]]
  from = "/Cv"
  to = "/cv.pdf"
  status = 200

[[redirects]]
  from = "/cV"
  to = "/cv.pdf"
  status = 200
